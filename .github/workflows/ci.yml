name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t flask-app .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name flask-container flask-app

    - name: Check container logs
      run: docker logs flask-container

    - name: Test container
      run: |
        sleep 10
        curl http://localhost:5000

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_COMPOSE_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_COMPOSE_USERNAME }}" --password-stdin

    - name: Tag image
      run: docker tag flask-app ${{ secrets.DOCKER_COMPOSE_USERNAME }}/flask-app:latest

    - name: Push image
      run: docker push ${{ secrets.DOCKER_COMPOSE_USERNAME }}/flask-app:latest