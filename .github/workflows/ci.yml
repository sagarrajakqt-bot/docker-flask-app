name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t flask-app .

    - name: Run container
      run: docker run -d -p 5000:5000 flask-app

    - name: Test container
      run: |
        sleep 5
        curl http://localhost:5000
